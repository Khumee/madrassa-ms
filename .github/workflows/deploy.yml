name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: 185.217.127.114
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script_stop: true
        script: |
          # Ensure target directory exists
          if [ ! -d "/var/www/kui-ms" ]; then
            echo "Cloning repository..."
            sudo mkdir -p /var/www/kui-ms
            sudo chown -R ${{ secrets.SERVER_USER }}:${{ secrets.SERVER_USER }} /var/www/kui-ms
            git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git /var/www/kui-ms
          fi
          
          cd /var/www/kui-ms
          git pull origin main
          
          # Force create .env file
          cat <<EOF > .env
          PORT=3000
          DB_HOST=localhost
          DB_PORT=3306
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          SESSION_SECRET=${{ secrets.SESSION_SECRET }}
          EOF
          
          npm install --production
          # Stop old process and start fresh to ensure everything is updated
          pm2 delete kui-ms || true
          pm2 start server.js --name "kui-ms"
          pm2 save
